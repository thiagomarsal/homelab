---
# Play 1: Ensure ZFS directory exists on k3s-worker-1
- name: Prepare k3s-worker-1 storage
  hosts: k3s-worker-1
  become: true
  tasks:
    - name: Ensure MinIO ZFS data directory exists
      file:
        path: "{{ video_pipeline.zfs_minio_path }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

# Play 2: Deploy all components to the cluster
- name: Deploy video pipeline infrastructure
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars:
    kube: "kubectl --kubeconfig {{ lookup('env', 'HOME') }}/.kube/config --context homelab"
    helm: "helm --kubeconfig {{ lookup('env', 'HOME') }}/.kube/config --kube-context homelab"
    repo_root: "{{ playbook_dir }}/../../../"

  tasks:
    - name: Add and update Helm repos
      shell: |
        helm repo add strimzi https://strimzi.io/charts/ 2>/dev/null || true
        helm repo add bitnami https://charts.bitnami.com/bitnami 2>/dev/null || true
        helm repo add minio https://charts.min.io/ 2>/dev/null || true
        helm repo update
      changed_when: false

    - name: Create namespaces
      shell: "{{ kube }} apply -f {{ item }}"
      loop:
        - "{{ repo_root }}/kubernetes/apps/kafka/namespace.yaml"
        - "{{ repo_root }}/kubernetes/apps/redis/namespace.yaml"
        - "{{ repo_root }}/kubernetes/storage/minio/namespace.yaml"
      changed_when: false

    - name: Install Strimzi operator
      shell: >
        {{ helm }} upgrade --install strimzi strimzi/strimzi-kafka-operator
        --version {{ video_pipeline.strimzi_version }}
        --namespace kafka
        --values {{ repo_root }}/kubernetes/apps/kafka/values.yaml
        --wait --timeout 5m

    - name: Apply KafkaNodePool and Kafka CRs
      shell: "{{ kube }} apply -f {{ repo_root }}/kubernetes/apps/kafka/kafka-cluster.yaml"
      changed_when: false

    - name: Wait for Kafka cluster to be Ready
      shell: |
        for i in $(seq 1 30); do
          STATUS=$({{ kube }} get kafka kafka-cluster -n kafka \
            -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null)
          if [ "$STATUS" = "True" ]; then
            echo "Kafka cluster is Ready"
            exit 0
          fi
          echo "Waiting for Kafka ($i/30)..."
          sleep 10
        done
        echo "Timed out waiting for Kafka"
        exit 1
      register: kafka_wait
      changed_when: false

    - name: Create Redis secret
      shell: >
        {{ kube }} create secret generic redis-secret
        --namespace redis
        --from-literal=password={{ redis_password }}
        --dry-run=client -o yaml | {{ kube }} apply -f -
      no_log: true
      changed_when: false

    - name: Install Redis
      shell: >
        {{ helm }} upgrade --install redis bitnami/redis
        --version {{ video_pipeline.redis_chart_version }}
        --namespace redis
        --values {{ repo_root }}/kubernetes/apps/redis/values.yaml
        --wait --timeout 3m

    - name: Apply MinIO PersistentVolume and PVC
      shell: "{{ kube }} apply -f {{ item }}"
      loop:
        - "{{ repo_root }}/kubernetes/storage/minio/pv.yaml"
        - "{{ repo_root }}/kubernetes/storage/minio/pvc.yaml"
      changed_when: false

    - name: Create MinIO secret
      shell: >
        {{ kube }} create secret generic minio-secret
        --namespace minio
        --from-literal=rootUser={{ minio_root_user }}
        --from-literal=rootPassword={{ minio_root_password }}
        --dry-run=client -o yaml | {{ kube }} apply -f -
      no_log: true
      changed_when: false

    - name: Install MinIO
      shell: >
        {{ helm }} upgrade --install minio minio/minio
        --version {{ video_pipeline.minio_chart_version }}
        --namespace minio
        --values {{ repo_root }}/kubernetes/storage/minio/values.yaml
        --wait --timeout 3m

    - name: Deployment summary
      debug:
        msg:
          - "=== Video Pipeline Infrastructure Deployed ==="
          - "Kafka (plain): kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
          - "Kafka (TLS):   kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9093"
          - "Redis:         redis-master.redis.svc.cluster.local:6379"
          - "MinIO S3:      minio.minio.svc.cluster.local:9000"
          - "MinIO Console: https://minio-console.tmf-solutions.com"
