---
- name: Tear down video pipeline infrastructure
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars:
    kube: "kubectl --kubeconfig {{ lookup('env', 'HOME') }}/.kube/config --context homelab"
    helm: "helm --kubeconfig {{ lookup('env', 'HOME') }}/.kube/config --kube-context homelab"

  tasks:
    - name: Uninstall MinIO
      shell: "{{ helm }} uninstall minio --namespace minio --wait --timeout 2m"
      ignore_errors: true
      changed_when: false

    - name: Delete MinIO PVC
      shell: "{{ kube }} delete pvc minio-data -n minio --ignore-not-found --timeout=60s"
      ignore_errors: true
      changed_when: false

    - name: Delete MinIO PV
      shell: "{{ kube }} delete pv minio-pv --ignore-not-found"
      ignore_errors: true
      changed_when: false

    - name: Uninstall Redis
      shell: "{{ helm }} uninstall redis --namespace redis --wait --timeout 2m"
      ignore_errors: true
      changed_when: false

    - name: Delete KafkaNodePool CR
      shell: "{{ kube }} delete kafkanodepool dual-role -n kafka --ignore-not-found --timeout=120s"
      ignore_errors: true
      changed_when: false

    - name: Delete Kafka CR
      shell: "{{ kube }} delete kafka kafka-cluster -n kafka --ignore-not-found --timeout=120s"
      ignore_errors: true
      changed_when: false

    - name: Uninstall Strimzi operator
      shell: "{{ helm }} uninstall strimzi --namespace kafka --wait --timeout 3m"
      ignore_errors: true
      changed_when: false

    - name: Delete namespaces
      shell: "{{ kube }} delete namespace {{ item }} --ignore-not-found --timeout=120s"
      loop:
        - minio
        - redis
        - kafka
      ignore_errors: true
      changed_when: false

    - name: Teardown complete
      debug:
        msg:
          - "=== Video Pipeline Infrastructure Torn Down ==="
          - "ZFS data at /mnt/storage/minio on k3s-worker-1 was NOT deleted."
          - "Re-run deploy.yml to restore the infrastructure."
