---
# DO NOT COMMIT WITH REAL VALUES — apply manually:
#   kubectl apply -f <(cat <<EOF
#   apiVersion: v1
#   kind: Secret
#   metadata:
#     name: cloudflare-api-token
#     namespace: cert-manager
#   type: Opaque
#   stringData:
#     api-token: "YOUR_CLOUDFLARE_API_TOKEN"
#   EOF
#   )
#
# Token needs permissions: Zone:DNS:Edit + Zone:Zone:Read
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
type: Opaque
stringData:
  api-token: "REPLACE_WITH_ACTUAL_TOKEN"
