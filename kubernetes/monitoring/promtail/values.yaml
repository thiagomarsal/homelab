# Promtail Helm values — K3s DaemonSet log shipper
# Chart: grafana/promtail v6.17.1
# Ships: all pod logs + K3s node systemd journal logs

config:
  logLevel: info
  clients:
    - url: http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push

  # Scrape pod logs and systemd journal
  snippets:
    extraScrapeConfigs: |
      # K3s systemd journal logs (node-level)
      - job_name: journal
        journal:
          path: /var/log/journal
          max_age: 12h
          labels:
            job: systemd-journal
        relabel_configs:
          - source_labels: [__journal__systemd_unit]
            target_label: unit
          - source_labels: [__journal__hostname]
            target_label: node

# Mount journal directory from host
extraVolumes:
  - name: journal
    hostPath:
      path: /var/log/journal

extraVolumeMounts:
  - name: journal
    mountPath: /var/log/journal
    readOnly: true

# Tolerations to run on all nodes including masters
tolerations:
  - operator: Exists
