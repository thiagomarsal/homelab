---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: n8n
  namespace: n8n
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`n8n.tmf-solutions.com`)
      kind: Rule
      services:
        - name: n8n
          port: 80
  tls: {}  # uses TLSStore default — wildcard cert from traefik namespace
