---
# DO NOT COMMIT WITH REAL VALUES — apply manually:
#
#   kubectl apply -n n8n -f - <<EOF
#   apiVersion: v1
#   kind: Secret
#   metadata:
#     name: n8n-secret
#     namespace: n8n
#   type: Opaque
#   stringData:
#     N8N_ENCRYPTION_KEY: "$(openssl rand -hex 32)"
#   EOF
#
apiVersion: v1
kind: Secret
metadata:
  name: n8n-secret
  namespace: n8n
type: Opaque
stringData:
  N8N_ENCRYPTION_KEY: "REPLACE_WITH_RANDOM_32_CHAR_HEX"
