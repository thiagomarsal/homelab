# Jenkins — Helm values
# Chart: jenkins/jenkins
# Repo:  https://charts.jenkins.io
# Helm install:
#   helm repo add jenkins https://charts.jenkins.io
#   helm repo update
#   helm install jenkins jenkins/jenkins \
#     -n jenkins -f kubernetes/apps/jenkins/values.yaml

controller:
  # lts is the latest stable Jenkins release (LTS line)
  image:
    tag: "lts"

  serviceType: ClusterIP
  servicePort: 8080

  # Admin credentials from a pre-existing secret.
  # Create the secret before deploying:
  #   kubectl create secret generic jenkins-admin-secret \
  #     --from-literal=jenkins-admin-user=admin \
  #     --from-literal=jenkins-admin-password=<password> \
  #     -n jenkins
  admin:
    existingSecret: jenkins-admin-secret
    userKey: jenkins-admin-user
    passwordKey: jenkins-admin-password

  # Disable built-in ingress — Traefik IngressRoute handles routing
  ingress:
    enabled: false

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

  # JVM tuning for container-aware heap sizing
  javaOpts: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"

persistence:
  enabled: true
  storageClass: local-path
  size: 20Gi

# Disable agent side of the chart — add agents separately if needed
agent:
  enabled: false
