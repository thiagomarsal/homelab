---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hoa-mariadb-data
  namespace: hoa
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 8Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: hoa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  strategy:
    type: Recreate  # required — PVC is RWO, only one pod at a time
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      securityContext:
        fsGroup: 999  # mariadb image runs as uid/gid 999
      containers:
        - name: mariadb
          image: mariadb:11.4  # LTS; bump deliberately
          args:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
          ports:
            - containerPort: 3306
          envFrom:
            - secretRef:
                name: hoa-db-secret  # provides MARIADB_* keys (extra WORDPRESS_* keys are harmless)
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            exec:
              command: ["healthcheck.sh", "--connect", "--innodb_initialized"]
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            exec:
              command: ["healthcheck.sh", "--connect", "--innodb_initialized"]
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hoa-mariadb-data
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: hoa
spec:
  selector:
    app: mariadb
  ports:
    - port: 3306
      targetPort: 3306
