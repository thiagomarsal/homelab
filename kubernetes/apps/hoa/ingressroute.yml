---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hoa
  namespace: hoa
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`hoa.tmf-solutions.com`)
      kind: Rule
      services:
        - name: wordpress
          port: 80
  tls: {}  # uses TLSStore default — wildcard cert from traefik namespace
