---
# Local caching/locking Redis for Nextcloud (memcache.local, memcache.locking).
# Not shared with other apps — keeps blast radius scoped to this namespace.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: nextcloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --requirepass
            - $(REDIS_HOST_PASSWORD)
          envFrom:
            - secretRef:
                name: nextcloud-redis-secret
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: 32Mi
              cpu: 20m
            limits:
              memory: 128Mi
              cpu: 200m
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: nextcloud
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
