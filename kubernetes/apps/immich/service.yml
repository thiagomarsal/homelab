---
# Headless Service + Endpoints proxying to Immich LXC at 192.168.1.20
apiVersion: v1
kind: Service
metadata:
  name: immich
  namespace: immich
spec:
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: Endpoints
metadata:
  name: immich
  namespace: immich
subsets:
  - addresses:
      - ip: 192.168.1.20
    ports:
      - port: 80
