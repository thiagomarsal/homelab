---
# DO NOT COMMIT WITH REAL VALUES — apply manually:
#
#   kubectl apply -n cloudflare-ddns -f - <<EOF
#   apiVersion: v1
#   kind: Secret
#   metadata:
#     name: cloudflare-token
#     namespace: cloudflare-ddns
#   type: Opaque
#   data:
#     cloudflare-token: <base64-encoded-token>
#   EOF
#
# Get base64 value: kubectl get secret cloudflare-token -n default -o jsonpath='{.data.cloudflare-token}'
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-token
  namespace: cloudflare-ddns
type: Opaque
data:
  cloudflare-token: "REPLACE_WITH_BASE64_TOKEN"
