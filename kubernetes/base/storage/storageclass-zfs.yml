---
# ZFS StorageClass via democratic-csi or similar
# Backed by raidz2 pool on pve04
# TODO: configure with actual democratic-csi driver settings
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: zfs-raidz2
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: org.democratic-csi.nfs  # update to match your CSI driver
reclaimPolicy: Retain
volumeBindingMode: Immediate
